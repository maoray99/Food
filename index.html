<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodExpress - អាហារសម្រន់ និងភេសជ្ជៈ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Freehand&family=Kantumruy+Pro:wght@100..700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; }
        #map { height: 350px; border-radius: 16px; border: 2px solid #e5e7eb; z-index: 1; }
        .active-tab { background-color: #2563eb !important; color: white !important; }
        .card-zoom:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="showSection('menu')">
                <i class="fas fa-utensils text-2xl"></i>
                <span class="text-xl font-bold tracking-tight">FoodExpress</span>
            </div>
            <div class="flex items-center space-x-6">
                <button onclick="showSection('menu')" class="hover:text-blue-200 transition">ម៉ឺនុយ</button>
                <button onclick="showSection('cart')" class="relative p-2 bg-blue-700 rounded-full hover:bg-blue-800 transition">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-[10px] px-1.5 rounded-full border border-white">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-6">
        
        <section id="menu-section">
            <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8 gap-4">
                <h2 class="text-2xl font-bold text-gray-800 border-l-4 border-blue-600 pl-3">មុខម្ហូបពិសេស</h2>
                <div class="relative group">
                    <input type="text" id="search" onkeyup="render()" placeholder="ស្វែងរកម្ហូប..." class="w-full md:w-72 p-3 pl-10 bg-white border rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <i class="fas fa-search absolute left-3 top-4 text-gray-400 group-focus-within:text-blue-500"></i>
                </div>
            </div>

            <div class="flex space-x-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="filterCat('All')" class="cat-btn px-6 py-2 rounded-full bg-white border text-sm font-medium shadow-sm active-tab transition">ទាំងអស់</button>
                <button onclick="filterCat('Appetizers')" class="cat-btn px-6 py-2 rounded-full bg-white border text-sm font-medium shadow-sm transition">អាហារសម្រន់</button>
                <button onclick="filterCat('Tea')" class="cat-btn px-6 py-2 rounded-full bg-white border text-sm font-medium shadow-sm transition">តែ</button>
                <button onclick="filterCat('Coffee')" class="cat-btn px-6 py-2 rounded-full bg-white border text-sm font-medium shadow-sm transition">កាហ្វេ</button>
            </div>

            <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="cart-section" class="hidden animate-fade-in">
            <div class="flex items-center space-x-2 mb-6">
                <button onclick="showSection('menu')" class="text-blue-600 p-2 hover:bg-blue-50 rounded-full transition"><i class="fas fa-arrow-left"></i></button>
                <h2 class="text-2xl font-bold">បញ្ជាក់ការកុម្ម៉ង់</h2>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border space-y-5">
                        <h3 class="font-bold text-gray-800 flex items-center"><i class="fas fa-id-card mr-2 text-blue-500"></i>ព័ត៌មានអតិថិជន</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="name" placeholder="ឈ្មោះពេញរបស់អ្នក" class="p-3.5 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <input type="text" id="phone" placeholder="លេខទូរស័ព្ទ" class="p-3.5 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>

                        <div class="pt-4 border-t">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="font-bold text-gray-800 flex items-center"><i class="fas fa-map-marked-alt mr-2 text-green-500"></i>ទីតាំងដឹកជញ្ជូន</h3>
                                <button onclick="getLocation()" class="bg-green-100 text-green-700 text-xs px-4 py-2 rounded-full font-bold hover:bg-green-200 transition">
                                    <i class="fas fa-location-crosshairs mr-1"></i> ចាប់ទីតាំងបច្ចុប្បន្ន
                                </button>
                            </div>
                            <div id="map" class="mb-3"></div>
                            <input type="text" id="coords" readonly placeholder="កូអរដោនេ (Lat, Lng)" class="w-full p-2.5 bg-gray-100 border rounded-xl text-xs text-center text-gray-500 mb-4">
                            <textarea id="addr" placeholder="អាសយដ្ឋានលម្អិត (ឧទាហរណ៍៖ ផ្ទះលេខ ១២A ផ្លូវ ២៧១)" class="w-full p-4 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none h-24 transition"></textarea>
                        </div>

                        <div class="pt-4 border-t">
                            <h3 class="font-bold text-gray-800 mb-4 text-sm">រូបភាពទីតាំង (ផ្ទះ ឬ ច្រកចូល)</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div onclick="document.getElementById('f1').click()" class="border-2 border-dashed rounded-2xl p-6 text-center cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition group">
                                    <i class="fas fa-camera text-2xl text-gray-300 group-hover:text-blue-500 mb-2"></i>
                                    <p class="text-[10px] text-gray-400 uppercase tracking-widest">រូបភាពទី ១</p>
                                    <input type="file" id="f1" class="hidden" accept="image/*" onchange="preview(this, 'v1')">
                                    <img id="v1" class="hidden h-24 mx-auto mt-3 rounded-xl shadow-md border-2 border-white">
                                </div>
                                <div onclick="document.getElementById('f2').click()" class="border-2 border-dashed rounded-2xl p-6 text-center cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition group">
                                    <i class="fas fa-camera text-2xl text-gray-300 group-hover:text-blue-500 mb-2"></i>
                                    <p class="text-[10px] text-gray-400 uppercase tracking-widest">រូបភាពទី ២</p>
                                    <input type="file" id="f2" class="hidden" accept="image/*" onchange="preview(this, 'v2')">
                                    <img id="v2" class="hidden h-24 mx-auto mt-3 rounded-xl shadow-md border-2 border-white">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-lg border border-blue-50 sticky top-24">
                        <h3 class="font-bold text-xl mb-6 flex items-center"><i class="fas fa-receipt mr-2 text-blue-500"></i>សរុបការបញ្ជាទិញ</h3>
                        <div id="cart-items-summary" class="max-h-60 overflow-y-auto mb-6 pr-2 space-y-4">
                            </div>
                        <div class="space-y-3 pt-4 border-t border-dashed">
                            <div class="flex justify-between text-gray-500"><span>តម្លៃសរុប:</span> <span id="sum-sub">$0.00</span></div>
                            <div class="flex justify-between text-red-500"><span>បញ្ចុះតម្លៃ:</span> <span id="sum-disc">-$0.00</span></div>
                            <div class="flex justify-between font-extrabold text-2xl text-gray-800 pt-2">
                                <span>សរុបចុងក្រោយ:</span> <span id="sum-total" class="text-blue-600">$0.00</span>
                            </div>
                        </div>
                        <button onclick="submitOrder()" id="btn-submit" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                            <i class="fas fa-check-circle mr-2"></i> កុម្ម៉ង់ឥឡូវនេះ
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycby-VV5CNhBDisDy1v36kpsbMxf0W-oH6KPScpE9G0PYY7k3PL62c0Z2dZe2NPWeOjSf/exec";
        let products = [], cart = [], currentCat = 'All', map, marker;

        async function init() {
            const res = await fetch(API);
            products = await res.json();
            render();
            initMap();
        }

        function render() {
            const grid = document.getElementById('menu-grid');
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = products.filter(p => (currentCat === 'All' || p.Category === currentCat) && p.Name.toLowerCase().includes(q));
            
            grid.innerHTML = filtered.map(p => `
                <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 card-zoom">
                    <div class="relative h-52 overflow-hidden">
                        <img src="${p.ImageUrl}" class="w-full h-full object-cover transition-transform duration-500">
                        <span class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold text-blue-600 shadow-sm uppercase">${p.Category}</span>
                        ${p.Discount > 0 ? `<span class="absolute top-4 right-4 bg-red-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md animate-pulse">PROMO</span>` : ''}
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-lg text-gray-800 mb-1">${p.Name}</h3>
                        <p class="text-gray-400 text-xs mb-4 line-clamp-1">${p.Description || 'មិនមានការពិពណ៌នា'}</p>
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-xl font-black text-blue-600">$${p.Price.toFixed(2)}</span>
                                ${p.Discount > 0 ? `<span class="text-xs text-gray-400 line-through ml-2">$${(p.Price + p.Discount).toFixed(2)}</span>` : ''}
                            </div>
                            <button onclick="addToCart('${p.ID}')" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 shadow-lg shadow-blue-100 transition active:scale-90">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.ID == id);
            const exist = cart.find(x => x.ID == id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateCart();
        }

        function updateCart() {
            const count = cart.reduce((a,b) => a + b.qty, 0);
            document.getElementById('cart-count').innerText = count;
            
            const summaryList = document.getElementById('cart-items-summary');
            let sub = 0, disc = 0;
            
            summaryList.innerHTML = cart.map(item => {
                const lineTotal = (item.Price - (item.Discount || 0)) * item.qty;
                sub += item.Price * item.qty;
                disc += (item.Discount || 0) * item.qty;
                return `
                    <div class="flex items-center space-x-3 group">
                        <img src="${item.ImageUrl}" class="w-12 h-12 rounded-lg object-cover">
                        <div class="flex-1">
                            <h4 class="text-sm font-bold text-gray-800">${item.Name}</h4>
                            <div class="flex items-center space-x-2 mt-1">
                                <button onclick="changeQty('${item.ID}', -1)" class="w-6 h-6 bg-gray-100 rounded text-xs hover:bg-gray-200">-</button>
                                <span class="text-xs font-bold w-4 text-center">${item.qty}</span>
                                <button onclick="changeQty('${item.ID}', 1)" class="w-6 h-6 bg-gray-100 rounded text-xs hover:bg-gray-200">+</button>
                                <span class="text-xs font-bold text-blue-600 ml-2">$${lineTotal.toFixed(2)}</span>
                            </div>
                        </div>
                        <button onclick="removeFromCart('${item.ID}')" class="text-gray-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100"><i class="fas fa-times-circle"></i></button>
                    </div>
                `;
            }).join('');

            document.getElementById('sum-sub').innerText = `$${sub.toFixed(2)}`;
            document.getElementById('sum-disc').innerText = `-$${disc.toFixed(2)}`;
            document.getElementById('sum-total').innerText = `$${(sub - disc).toFixed(2)}`;
        }

        function changeQty(id, delta) {
            const item = cart.find(x => x.ID == id);
            item.qty += delta;
            if(item.qty < 1) removeFromCart(id);
            updateCart();
        }
        function removeFromCart(id) { cart = cart.filter(x => x.ID != id); updateCart(); }

        // MAP LOGIC
        function initMap() {
            map = L.map('map').setView([11.5564, 104.9282], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([11.5564, 104.9282], {draggable: true}).addTo(map);
            marker.on('moveend', (e) => updateCoords(e.target.getLatLng()));
            map.on('click', (e) => { marker.setLatLng(e.latlng); updateCoords(e.latlng); });
        }

        function updateCoords(latlng) {
            document.getElementById('coords').value = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const ll = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    map.setView(ll, 17); marker.setLatLng(ll); updateCoords(ll);
                }, () => alert("មិនអាចចាប់ទីតាំងបាន!"));
            }
        }

        function preview(input, target) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const el = document.getElementById(target);
                    el.src = e.target.result; el.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitOrder() {
            const btn = document.getElementById('btn-submit');
            const data = {
                customerName: document.getElementById('name').value,
                customerMobile: document.getElementById('phone').value,
                address: document.getElementById('addr').value,
                mapCoordinates: document.getElementById('coords').value,
                locImg1: document.getElementById('v1').src || "",
                locImg2: document.getElementById('v2').src || "",
                subtotal: parseFloat(document.getElementById('sum-sub').innerText.replace('$','')),
                discount: parseFloat(document.getElementById('sum-disc').innerText.replace('-$','')),
                totalAmount: parseFloat(document.getElementById('sum-total').innerText.replace('$','')),
                cart: cart, tax: 0
            };

            if(!data.customerName || !data.customerMobile || cart.length === 0) return alert("សូមបំពេញព័ត៌មានឱ្យបានគ្រប់គ្រាន់!");

            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងបញ្ជូន...';
            try {
                await fetch(API, { method: 'POST', body: JSON.stringify(data) });
                alert("ការកុម្ម៉ង់ជោគជ័យ! យើងខ្ញុំនឹងទាក់ទងទៅក្នុងពេលឆាប់ៗ។");
                window.location.reload();
            } catch (e) {
                alert("មានបញ្ហាបច្ចេកទេស! សូមព្យាយាមម្តងទៀត។");
                btn.disabled = false; btn.innerText = "កុម្ម៉ង់ឥឡូវនេះ";
            }
        }

        function filterCat(c) {
            currentCat = c;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-tab'));
            event.target.classList.add('active-tab');
            render();
        }

        function showSection(s) {
            document.getElementById('menu-section').classList.toggle('hidden', s !== 'menu');
            document.getElementById('cart-section').classList.toggle('hidden', s !== 'cart');
            if(s === 'cart') setTimeout(() => map.invalidateSize(), 300);
        }

        window.onload = init;
    </script>
</body>
</html>
